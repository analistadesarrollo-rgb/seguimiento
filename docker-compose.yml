services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visitas-app
    ports:
      - "4322:80"
    environment:
      NODE_ENV: production
      PORT: 80
      HOST: 0.0.0.0
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    networks:
      red-gane-int:
        aliases:
          - visitas-app
          - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  red-gane-int:
    external: true
