services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visitas-app
    ports:
      - "4322:80"
    environment:
      NODE_ENV: production
      PORT: 80
      HOST: 0.0.0.0
      DB_HOST: 172.20.1.92
      DB_USER: cliente
      DB_PASS: adminadmon
      DB_NAME: appseguimiento
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    networks:
      red-gane-int:
        aliases:
          - visitas-app
          - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  red-gane-int:
    external: true
