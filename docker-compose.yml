version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visitas-app
    env_file:
      - .env
    ports:
      - "4322:4322"
    environment:
      - NODE_ENV=production
      - PORT=4322
      - HOST=0.0.0.0
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    networks:
      - red-gane-int
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4322"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  red-gane-int:
    external: true
